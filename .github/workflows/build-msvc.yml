name: Build - MSVC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build - MSVC (coroutines ${{ matrix.job-coroutines }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        job-coroutines: [ON, OFF]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake project
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DARC_BUILD_EDITOR=OFF
          -DARC_BUILD_RENDER_VULKAN=OFF
          -DARC_BUILD_ENGINE_TESTS=ON
          -DARC_ENABLE_JOB_COROUTINES=${{ matrix.job-coroutines }}
          -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
