name: LLVM Coverage

on:
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset coverage-clang
      - name: Build
        run: cmake --build --preset coverage-clang --parallel
      - name: Generate report
        run: python3 tools/generate_coverage.py
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: llvm-coverage
          path: out/coverage
