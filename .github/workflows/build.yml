name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clang:
    name: Build: Clang
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build

      - name: Configure CMake project
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_BUILD_TYPE=Release
          -DARC_BUILD_EDITOR=OFF
          -DARC_BUILD_RENDER_VULKAN=OFF
          -DARC_BUILD_ENGINE_TESTS=ON
          -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  vs2022:
    name: Build: VS2022
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake project
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DARC_BUILD_EDITOR=OFF
          -DARC_BUILD_RENDER_VULKAN=OFF
          -DARC_BUILD_ENGINE_TESTS=ON
          -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
